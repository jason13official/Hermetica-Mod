plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT' apply(false)
    id 'net.neoforged.moddev.legacyforge' version '2.0.77' apply(false)

    id "io.github.pacifistmc.forgix" version "2.0.0-SNAPSHOT.2.3" // pinned
}

forgix {
    autoRun = true

    archiveBaseName = "${mod_id}-merged-${minecraft_version}"
}